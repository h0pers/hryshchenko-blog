name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max

      - name: Cleanup old images
        uses: snok/container-retention-policy@v3.0.0
        with:
          account: user
          token: ${{ secrets.PACKAGES_TOKEN }}
          image-names: ${{ github.event.repository.name }}
          cut-off: 1h
          tag-selection: untagged

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          {
            echo "GITHUB_REPOSITORY=${{ github.repository }}"
            echo "COMPOSE_PROJECT_NAME=${{ github.event.repository.name }}"
            echo "MY_DOMAIN=${{ vars.MY_DOMAIN }}"
            echo "DJANGO_ENV=production"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "POSTGRES_HOST=postgres"
            echo "POSTGRES_PORT=5432"
            echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}"
            echo "CACHE_URL=redis://redis:6379/0"
            if [ -n "${{ secrets.DJANGO_SUPERUSER_USERNAME }}" ]; then
              echo "DJANGO_SUPERUSER_USERNAME=${{ secrets.DJANGO_SUPERUSER_USERNAME }}"
            fi
            if [ -n "${{ secrets.DJANGO_SUPERUSER_PASSWORD }}" ]; then
              echo "DJANGO_SUPERUSER_PASSWORD=${{ secrets.DJANGO_SUPERUSER_PASSWORD }}"
            fi
            if [ -n "${{ secrets.DJANGO_SUPERUSER_EMAIL }}" ]; then
              echo "DJANGO_SUPERUSER_EMAIL=${{ secrets.DJANGO_SUPERUSER_EMAIL }}"
            fi
          } > .env

      - name: Copy configs to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env,docker-compose.yml"
          target: "~/${{ github.event.repository.name }}/"
          overwrite: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REPO_NAME: ${{ github.event.repository.name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,REPO_NAME
          script: |
            set -euo pipefail
            APP_DIR="$HOME/$REPO_NAME"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            docker compose pull backend
            docker compose up -d postgres
            docker compose run --rm backend python manage.py migrate --noinput

            docker rollout backend --timeout 120

            docker image prune -f